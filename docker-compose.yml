# Obsideo Provider - Docker Compose
#
# Usage:
#   1. cp .env.example .env
#   2. Edit .env (set TS_AUTHKEY at minimum)
#   3. docker compose up -d
#   4. docker compose logs -f provider
#
# See QUICKSTART.md for full instructions.

services:
  tailscale:
    image: tailscale/tailscale:v1.96.4
    hostname: ${TS_HOSTNAME:-obsideo-provider}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME:-obsideo-provider}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_USERSPACE=true
    volumes:
      - ts-state:/var/lib/tailscale
      - ts-sock:/var/run/tailscale
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status", "--json"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  provider:
    build: .
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    environment:
      - OBSIDEO_COORDINATOR_URL=${OBSIDEO_COORDINATOR_URL:-https://coordinator.obsideo.io}
      - OBSIDEO_WALLET_ADDRESS=${OBSIDEO_WALLET_ADDRESS:-}
      - OBSIDEO_CAPACITY_BYTES=${OBSIDEO_CAPACITY_BYTES:-10737418240}
      - OBSIDEO_PROVIDER_ID=${OBSIDEO_PROVIDER_ID:-}
      - OBSIDEO_PROVIDER_PORT=${OBSIDEO_PROVIDER_PORT:-3334}
      - OBSIDEO_PROVIDER_ADDRESS=${OBSIDEO_PROVIDER_ADDRESS:-}
    volumes:
      - provider-data:/app/data
      - ts-sock:/var/run/tailscale
    restart: unless-stopped

volumes:
  ts-state:      # Tailscale identity (persists across restarts)
  ts-sock:       # Tailscale socket (shared between containers)
  provider-data: # Stored objects + provider identity (back this up)
